name: Build Windows Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pywebview pyinstaller pillow

      - name: Convert icon to .ico
        run: |
          python -c "from PIL import Image; img = Image.open('ocean-icon.jpg').convert('RGBA'); img.save('icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build OceanShare.exe
        run: pyinstaller --clean --noconfirm surfshare.spec

      - name: Build installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OceanShare-Windows-Installer
          path: installer-output/OceanShare-Setup.exe
          if-no-files-found: error
