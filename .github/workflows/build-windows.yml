name: Build Windows Portable

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Python embeddable
        shell: pwsh
        run: |
          $pyVer = "3.11.9"
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/$pyVer/python-$pyVer-embed-amd64.zip" -OutFile python-embed.zip
          New-Item -ItemType Directory -Path OceanShare\python -Force | Out-Null
          Expand-Archive python-embed.zip -DestinationPath OceanShare\python -Force

      - name: Enable site-packages in embedded Python
        shell: pwsh
        run: |
          $pthFile = Get-ChildItem OceanShare\python\python*._pth | Select-Object -First 1
          (Get-Content $pthFile.FullName) -replace '#import site', 'import site' | Set-Content $pthFile.FullName

      - name: Bootstrap pip
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://bootstrap.pypa.io/get-pip.py -OutFile get-pip.py
          .\OceanShare\python\python.exe get-pip.py --no-warn-script-location

      - name: Install pywebview
        shell: pwsh
        run: |
          .\OceanShare\python\python.exe -m pip install --no-warn-script-location pywebview

      - name: Copy app files
        shell: pwsh
        run: |
          Copy-Item surfshare.py OceanShare\
          Copy-Item ocean-icon.jpg OceanShare\

      - name: Create run.bat
        shell: pwsh
        run: |
          $bat = @"
          @echo off
          cd /d `"%~dp0`"
          start `"`" `"%~dp0python\pythonw.exe`" `"%~dp0surfshare.py`"
          "@
          $bat | Out-File -Encoding ASCII OceanShare\run.bat

      - name: Create README
        shell: pwsh
        run: |
          $readme = @"
          OceanShare - Como usar

          1. Extraia esta pasta para algum lugar (Ex: Documentos)
          2. De duplo clique em run.bat
          3. Uma janela do OceanShare vai abrir

          Para criar um atalho na area de trabalho:
          Clique com botao direito em run.bat -> Enviar para -> Area de trabalho
          "@
          $readme | Out-File -Encoding UTF8 OceanShare\LEIA-ME.txt

      - name: Zip it
        shell: pwsh
        run: |
          Compress-Archive -Path OceanShare -DestinationPath OceanShare-Portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OceanShare-Windows-Portable
          path: OceanShare-Portable.zip
          if-no-files-found: error
